defaults:
  - src: circle_centered
  - tgt: triangle_centered
  - matcher: learned_stochastic
  - scenario: sgd_fixed_match
  - _self_

device: auto
seed: 0
# Sample budget seen by the policy (i.e. environment interactions). The loop
# iterates until traj >= total_trajectories. Cadence knobs below (eval,
# checkpoint) stay in gradient steps because they're tied to policy updates,
# not experience.
total_trajectories: 1_000_000
checkpoint_every_steps: 500   # null disables periodic checkpoints; end-of-run save always happens
batch_size: 8192

# Uniform-resample target count for the policy / inner SGD.
M: 16

# REINFORCE
entropy_coef: 0.01

# Baseline: type ∈ {none, ema, prior, chamfer_sgd}.
#   none        — zero baseline (raw REINFORCE).
#   ema         — scalar running mean of batch rewards (variance reduction only).
#   prior       — per-state SCST baseline: at each step, roll out the training
#                 scenario with the frozen-at-step-0 policy's argmax matching
#                 and use that reward as the baseline. Costs one extra
#                 (FixedMatch) scenario rollout per step.
#   chamfer_sgd — per-state baseline using a full-chamfer SGD scenario (with a
#                 fresh KNN match every inner iter) on the same src/tgt pair.
#                 Strictly stronger reference than `prior` but each step pays
#                 an inner SGD rollout that re-samples points and re-matches,
#                 so training is noticeably slower.
baseline:
  type: none
# baseline:
#   type: ema
#   momentum: 0.90
# baseline:
#   type: chamfer_sgd
#   scenario:
#     _target_: rlmd.evaluation.scenarios.SgdScenario
#     name: sgd_baseline
#     num_iters: 400
#     num_samples: 64
#     lr: 0.0625
#     momentum: 0.9
#     w_chamfer: 1.0
#     w_edge: 1.0
#     w_normal: 0.01
#     w_laplacian: 0.1
#     distance_p: 2
#   matcher:
#     _target_: rlmd.evaluation.matchers.Knn3dMatcher
#     bidirectional: true
# baseline:
#   type: prior

# Number of points to sample from each polyline for the reward Chamfer.
reward_num_samples: 8192

# Composite reward weights. Reward = -(w_chamfer * chamfer_sym + w_normal * normal_sym).
# chamfer_sym is squared-L2 in shape coords (~1e-3..1e-1); normal_sym is 1 - cos
# of matched-pair normals in [0, 2]. Tune empirically; w_normal=0 disables.
reward:
  w_chamfer: 1.0
  w_normal: 0.0

optimizer:
  _target_: torch.optim.Adam
  lr: 1.0e-4

# Periodic eval on a held-out (seeded) subset of the same datasets. Reuses the
# training scenario + M + reward Chamfer. Argmax LearnedMatcher wraps the live
# feature extractor; optionally also rolls out Knn3dMatcher on the same pairs
# for an on-the-fly baseline comparison.
eval:
  every_steps: 25       # null disables periodic eval
  num_samples: 1024
  seed_src: 100
  seed_tgt: 101
  batch_size: 1024
  compare_to_knn: true
  # Number of sampled-rollout passes through the streamed-eval batch
  # (averaged per-state). Reduces sampled-eval noise at proportional cost.
  sampled_num_rollouts: 1

hydra:
  job:
    chdir: false
  run:
    dir: outputs/train_matcher/${now:%Y-%m-%d}/${now:%H-%M-%S}
