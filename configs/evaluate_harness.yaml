defaults:
  - dataset_src: circle_translated_set
  - dataset_tgt: any_set
  - matcher: knn_3d
  - scenario: sgd_default
  - _self_

metrics:
  - _target_: rlmd.evaluation.metrics.ChamferMetric
    num_samples: 1024
    point_reduction: mean
    norm: 2
    with_normals: true
    abs_cosine: false
  - _target_: rlmd.evaluation.metrics.SegmentStdMetric
    unbiased: false
  - _target_: rlmd.evaluation.metrics.SelfIntersectionMetric

eval_num_samples: 32
seed_src: 0
seed_tgt: 1
batch_size: 16
num_workers: 0
pin_memory: false
device: auto

# Override the auto-dated hydra run dir with a fixed name. CLI: run_name=my_experiment
run_name: ???

output_csv: results.csv

# When true, write one PNG per batch (same layout as scripts/deform_polylines.py). CLI: visualize_deformations=true
visualize_deformations: true

# When enabled, record an MP4 animation of the deformation for the first K
# samples of the first batch. Only supported by scenarios whose `run` accepts a
# `record_every` kwarg (e.g. SgdScenario).
record_deformation:
  enabled: false
  first_k: 8
  every: 10           # snapshot V every N optimizer iters
  duration_s: 8.0     # target clip length; fps derived as num_frames / duration_s
  filename: deformation.mp4

# When set, both src and tgt polylines are uniformly arc-length resampled to M
# vertices on-device before scenario + metrics. Required for the learned-matcher
# path (M must match the checkpoint's training M). Useful as a fair-comparison
# setting for the Chamfer baseline too.
resample_M: null

hydra:
  job:
    chdir: false
  run:
    dir: outputs/evaluate_harness/${oc.select:run_name,${now:%Y-%m-%d}/${now:%H-%M-%S}}
